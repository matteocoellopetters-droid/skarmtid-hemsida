<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skärmtid</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Roboto", "Segoe UI", Arial, sans-serif;
            background-color: #000;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
        }

        /* Låsskärm */
        #login-page {
            background-color: #1c1c1e;
            width: 100%;
            max-width: 450px;
            height: 100%;
            border-radius: 40px 40px 0 0;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .pincode-section { margin-top: 170px; text-align: center; }
        .section-title { font-size: 17px; font-weight: 600; color: white; margin-bottom: 35px; }
        .dots-container { display: flex; gap: 24px; margin-bottom: 40px; }
        .dot { width: 15px; height: 15px; border: 1.5px solid white; border-radius: 50%; }
        .dot.active { background-color: white; }
        .error-pill { background-color: #ff3b30; color: white; padding: 6px 18px; border-radius: 50px; font-size: 13px; }

        /* Fake YouTube */
        #fake-youtube {
            display: none;
            background: #0f0f0f;
            color: white;
            width: 100%;
            max-width: 450px;
            height: 100vh;
            box-sizing: border-box;
        }

        #hidden-input { position: absolute; opacity: 0; }
    </style>
</head>
<body onclick="document.getElementById('hidden-input').focus()">

    <div id="login-page">
        <div class="pincode-section">
            <div class="section-title">Ange lösenkod för Skärmtid</div>
            <div class="dots-container">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
            <div class="error-pill">1 misslyckat lösenkodsförsök</div>
        </div>
    </div>

    <div id="fake-youtube">
        <header style="display: flex; justify-content: space-between; padding: 15px;">
            <div style="font-size: 22px; font-weight: bold;">YouTube</div>
            <div style="display: flex; gap: 15px;"><span>🔔</span><span>🔍</span></div>
        </header>

        <div style="display: flex; gap: 10px; padding: 10px; overflow-x: auto;">
            <button style="background: white; color: black; border: none; padding: 5px 15px; border-radius: 8px;">Allt</button>
            <button style="background: #333; color: white; border: none; padding: 5px 15px; border-radius: 8px;">Nytt för dig</button>
        </div>

        <div style="padding: 10px;">
           <img src="unnamed.jpg" style="width: 100%; height: 200px; object-fit: cover; border-radius: 12px;">
            <div style="display: flex; margin-top: 10px; gap: 10px;">
                <div style="width: 40px; height: 40px; background: #555; border-radius: 50%;"></div>
                <div>
                    <h3 style="font-size: 16px; margin: 0;">I Bought Every Part To Build An iPhone...</h3>
                    <p style="color: #aaa; font-size: 13px; margin: 0;">Phone Repair Guru • 14 mn visningar</p>
                </div>
            </div>
        </div>
        <h2 id="revealed-code" style="color: #ff3b30; text-align: center; margin-top: 50px;"></h2>
    </div>

    <input type="tel" id="hidden-input" maxlength="4">

    <script>
        const input = document.getElementById("hidden-input");
        const dots = document.querySelectorAll(".dot");
        const loginPage = document.getElementById("login-page");
        const fakeYoutube = document.getElementById("fake-youtube");
        const revealedCode = document.getElementById("revealed-code");

        input.focus();

        input.addEventListener("input", () => {
            let length = input.value.length;
            dots.forEach((dot, index) => {
                dot.classList.toggle("active", index < length);
            });

            if(length === 4) {
                let theCode = input.value;
                setTimeout(() => {
                    loginPage.style.display = "none";
                    fakeYoutube.style.display = "block";
                    setTimeout(() => {
                        revealedCode.innerText = "Koden du skrev in var: " + theCode;
                    }, 20000); 
                }, 300);
            }
        });
    </script>
</body>
</html>
